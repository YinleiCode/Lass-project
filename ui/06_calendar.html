<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>颂恩艺术 · 周课表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #1A2332; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px; font-family: 'Noto Sans SC', sans-serif;
  }
  :root {
    --paper: #F4F7FA; --paper-warm: #E8EFF5; --cream: #FFFFFF;
    --line: #DDE5ED; --line-soft: #EAF0F5;
    --ink: #2A3744; --ink-soft: #5A6B7E; --ink-mute: #93A3B5;
    --accent: #2C5282; --accent-soft: #BFD1E5; --accent-bg: #EDF3F9;
    --warn: #EA580C; --warn-bg: #FEF3C7;
    --green: #4D7C0F; --green-bg: #ECFCCB;
    --font-serif: 'Noto Serif SC', 'Songti SC', serif;
    --font-sans: 'Noto Sans SC', sans-serif;
    --font-script: 'Ma Shan Zheng', cursive;
    --font-num: 'DM Serif Display', 'Noto Serif SC', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  .phone-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .phone-label { color: #6B7E94; font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  .phone {
    width: 390px; height: 800px; background: var(--paper);
    border-radius: 44px; border: 12px solid #0F1620;
    box-shadow: 0 0 0 2px #1F2D3D, 0 60px 120px -30px rgba(0,0,0,0.5), 0 30px 60px -15px rgba(0,0,0,0.3);
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 110px; height: 28px; background: #0F1620; border-radius: 20px; z-index: 100; }
  .status-bar { height: 50px; padding: 18px 28px 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 500; color: var(--ink); flex-shrink: 0; }
  .status-bar .right { display: flex; gap: 5px; align-items: center; }
  .screen { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 100px; position: relative; }
  .screen::-webkit-scrollbar { display: none; }

  /* 顶部 */
  .calendar-hero {
    padding: 16px 22px 0;
    background: var(--paper);
  }

  .top-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  .page-title-block .title-en {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-mute);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .page-title {
    font-family: var(--font-serif);
    font-size: 26px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 1px;
    line-height: 1;
  }
  .page-actions { display: flex; gap: 8px; }
  .icon-btn-sq {
    width: 36px; height: 36px;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft);
  }

  /* 月份切换 */
  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
    padding: 8px 12px;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 12px;
  }
  .month-nav-arrow {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft);
  }
  .month-label {
    font-family: var(--font-serif);
    font-size: 16px;
    color: var(--ink);
    font-weight: 600;
    letter-spacing: 1px;
  }
  .month-label .week {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-mute);
    margin-left: 8px;
    letter-spacing: 1.5px;
  }
  .today-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
  }

  /* 周日历 */
  .week-bar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 22px;
  }

  .day-cell {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 8px 0 10px;
    text-align: center;
    position: relative;
  }
  .day-cell.has-class::after {
    content: "";
    position: absolute;
    bottom: 5px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }
  .day-cell.today {
    background: var(--ink);
    border-color: var(--ink);
  }
  .day-cell.today .day-name { color: rgba(250,246,240,0.7); }
  .day-cell.today .day-num { color: var(--paper); }
  .day-cell.today.has-class::after { background: var(--accent-soft); }

  .day-name {
    font-size: 10px;
    color: var(--ink-mute);
    font-family: var(--font-mono);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .day-num {
    font-family: var(--font-num);
    font-size: 18px;
    color: var(--ink);
    line-height: 1;
  }

  /* 日期标题 */
  .date-section-head {
    padding: 0 22px;
    margin-bottom: 14px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .date-section-title {
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.5px;
    position: relative;
    padding-left: 16px;
  }
  .date-section-title::before {
    content: ""; position: absolute; left: 0; top: 50%;
    transform: translateY(-50%);
    width: 4px; height: 16px; background: var(--accent); border-radius: 2px;
  }
  .date-section-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 1px;
  }

  /* 时间轴课程列表 */
  .timetable {
    padding: 0 22px;
  }

  .lesson-card {
    display: flex;
    gap: 14px;
    margin-bottom: 12px;
    position: relative;
  }

  .lesson-time-col {
    flex-shrink: 0;
    width: 56px;
    text-align: right;
    padding-top: 10px;
  }
  .lesson-time-hour {
    font-family: var(--font-num);
    font-size: 22px;
    color: var(--ink);
    line-height: 1;
  }
  .lesson-time-min {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-mute);
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .lesson-card-body {
    flex: 1;
    min-width: 0;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }
  .lesson-card-body::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }

  .lesson-card-body.done {
    background: var(--paper-warm);
    opacity: 0.7;
  }
  .lesson-card-body.done::before {
    background: var(--ink-mute);
  }

  .lesson-info-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .lesson-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
  }
  .lesson-status {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 100px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .lesson-status.pending {
    background: var(--accent-bg);
    color: var(--accent);
  }
  .lesson-status.done {
    background: var(--green-bg);
    color: var(--green);
  }

  .lesson-meta {
    font-size: 12px;
    color: var(--ink-soft);
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
  }
  .lesson-meta .badge {
    background: var(--accent-bg);
    color: var(--accent);
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
  }

  .lesson-actions {
    display: flex;
    gap: 8px;
  }
  .lesson-action-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .lesson-action-btn.secondary {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
  }

  /* 浮动添加按钮 */
  .fab {
    position: absolute;
    right: 18px; bottom: 90px;
    width: 56px; height: 56px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 50%;
    box-shadow: 0 12px 24px -8px rgba(44,82,130,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
  }

  /* Tab栏 */
  .tab-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 70px;
    background: rgba(250,246,240,0.85);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--line);
    display: flex; padding-bottom: 8px; z-index: 50;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    color: var(--ink-mute); font-size: 10px; letter-spacing: 0.5px;
    position: relative;
  }
  .tab.active { color: var(--accent); }
  .tab.active::before {
    content: ""; position: absolute; top: 8px;
    width: 24px; height: 3px; background: var(--accent);
    border-radius: 0 0 2px 2px;
  }
  .tab svg { width: 22px; height: 22px; }
</style>
</head>
<body>

<div class="phone-wrap">

      <!-- 当日课程标题 -->

      <!-- 时间轴课程 -->

        <div class="lesson-card">
