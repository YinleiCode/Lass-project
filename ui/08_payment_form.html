<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>颂恩艺术 · 登记缴费</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #1A2332; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px; font-family: 'Noto Sans SC', sans-serif;
  }
  :root {
    --paper: #F4F7FA; --paper-warm: #E8EFF5; --cream: #FFFFFF;
    --line: #DDE5ED; --line-soft: #EAF0F5;
    --ink: #2A3744; --ink-soft: #5A6B7E; --ink-mute: #93A3B5;
    --accent: #2C5282; --accent-soft: #BFD1E5; --accent-bg: #EDF3F9;
    --warn: #EA580C; --warn-bg: #FEF3C7;
    --green: #4D7C0F; --green-bg: #ECFCCB;
    --font-serif: 'Noto Serif SC', 'Songti SC', serif;
    --font-sans: 'Noto Sans SC', sans-serif;
    --font-script: 'Ma Shan Zheng', cursive;
    --font-num: 'DM Serif Display', 'Noto Serif SC', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  .phone-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .phone-label { color: #6B7E94; font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  .phone {
    width: 390px; height: 800px; background: var(--paper);
    border-radius: 44px; border: 12px solid #0F1620;
    box-shadow: 0 0 0 2px #1F2D3D, 0 60px 120px -30px rgba(0,0,0,0.5), 0 30px 60px -15px rgba(0,0,0,0.3);
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 110px; height: 28px; background: #0F1620; border-radius: 20px; z-index: 100; }
  .status-bar { height: 50px; padding: 18px 28px 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 500; color: var(--ink); flex-shrink: 0; }
  .status-bar .right { display: flex; gap: 5px; align-items: center; }
  .screen { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 100px; }
  .screen::-webkit-scrollbar { display: none; }

  .nav-bar {
    height: 48px; padding: 0 18px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--line-soft);
    background: rgba(250,246,240,0.9);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 10;
  }
  .nav-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--ink); margin-left: -6px; }
  .nav-title { font-family: var(--font-serif); font-size: 16px; font-weight: 600; color: var(--ink); letter-spacing: 1px; }
  .nav-spacer { width: 32px; }

  /* 收据样式头部 */
  .receipt-header {
    background: linear-gradient(180deg, #EDF3F9 0%, var(--paper) 100%);
    padding: 28px 22px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .receipt-header::before {
    content: "颂恩艺术";
    position: absolute;
    top: 16px; right: -10px;
    font-family: var(--font-script);
    font-size: 80px;
    color: var(--accent);
    opacity: 0.06;
    line-height: 1;
    pointer-events: none;
  }

  .receipt-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  .receipt-title {
    font-family: var(--font-serif);
    font-size: 26px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .receipt-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .receipt-divider .line {
    width: 30px; height: 1px;
    background: var(--accent-soft);
  }
  .receipt-divider .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }
  .receipt-date {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 1px;
  }

  /* 表单区 */
  .form-section {
    padding: 20px 22px 0;
  }

  .form-card {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
  }

  .form-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid var(--line-soft);
    min-height: 56px;
  }
  .form-row:last-child { border-bottom: none; }

  .form-label {
    font-size: 13px;
    color: var(--ink-soft);
    width: 80px;
    flex-shrink: 0;
    font-weight: 500;
  }
  .form-label::after {
    content: " *";
    color: var(--accent);
  }
  .form-label.optional::after {
    content: "";
  }

  .form-value {
    flex: 1;
    text-align: right;
    font-size: 14px;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
  }
  .form-value.placeholder {
    color: var(--ink-mute);
  }
  .form-value input {
    flex: 1;
    border: none;
    outline: none;
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--ink);
    text-align: right;
    background: transparent;
  }
  .form-value input::placeholder {
    color: var(--ink-mute);
  }
  .form-value .arrow {
    color: var(--ink-mute);
  }

  /* 选中的学员卡 */
  .selected-student {
    background: var(--accent-bg);
    border: 1px solid var(--accent-soft);
    border-radius: 100px;
    padding: 4px 12px 4px 4px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }
  .selected-student .ava {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-serif);
    font-size: 11px;
    font-weight: 600;
  }

  /* 金额显示 */
  .amount-row {
    background: var(--ink);
    color: var(--paper);
    padding: 18px 16px;
    margin-top: 16px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .amount-row::after {
    content: "";
    position: absolute;
    right: -20px; bottom: -20px;
    width: 100px; height: 100px;
    background: radial-gradient(circle, rgba(191,209,229,0.12) 0%, transparent 70%);
  }

  .amount-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: rgba(250,246,240,0.6);
    letter-spacing: 1.5px;
  }
  .amount-value {
    font-family: var(--font-num);
    font-size: 36px;
    color: var(--paper);
    line-height: 1;
  }
  .amount-value .currency {
    font-size: 18px;
    color: var(--accent-soft);
    margin-right: 4px;
  }

  /* 支付方式 */
  .pay-method-grid {
    display: flex;
    gap: 8px;
  }
  .pay-method-btn {
    flex: 1;
    padding: 8px 0;
    border: 1.5px solid var(--line);
    background: var(--cream);
    border-radius: 100px;
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .pay-method-btn.selected {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  /* 区段标题 */
  .form-section-title {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-mute);
    letter-spacing: 2px;
    margin-bottom: 10px;
    padding-left: 4px;
  }

  /* 预览卡 */
  .preview-card {
    margin: 20px 22px 0;
    background: linear-gradient(135deg, #ECFCCB 0%, var(--cream) 100%);
    border: 1px solid #BEF264;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .preview-icon {
    width: 32px; height: 32px;
    background: var(--green);
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .preview-text {
    flex: 1;
    font-size: 12px;
    color: #365314;
    line-height: 1.5;
  }
  .preview-text strong {
    font-family: var(--font-num);
    font-size: 18px;
    color: var(--green);
    font-weight: 400;
    margin: 0 2px;
  }

  /* 底部确认 */
  .submit-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--cream);
    border-top: 1px solid var(--line);
    padding: 12px 22px 22px;
    z-index: 50;
    box-shadow: 0 -8px 30px -10px rgba(0,0,0,0.05);
  }
  .submit-btn {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
</style>
</head>
<body>

<div class="phone-wrap">
  <div class="phone-label">老师端 · 登记缴费</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status-bar">
      <span>9:41</span>
      <div class="right">
        <svg width="16" height="11" viewBox="0 0 18 12" fill="none"><path d="M1 8L1 4M5 9L5 3M9 11L9 1M13 10L13 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <svg width="16" height="11" viewBox="0 0 16 12" fill="none"><path d="M1 4Q8 -2 15 4M3 6Q8 2 13 6M5 8Q8 6 11 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/><circle cx="8" cy="10" r="1" fill="currentColor"/></svg>
        <svg width="24" height="11" viewBox="0 0 24 12" fill="none"><rect x="0.5" y="1" width="20" height="10" rx="2" stroke="currentColor"/><rect x="2" y="2.5" width="16" height="7" rx="1" fill="currentColor"/><rect x="21" y="4" width="2" height="4" rx="0.5" fill="currentColor"/></svg>
      </div>
    </div>

    <div class="screen">
      <div class="nav-bar">
        <div class="nav-back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </div>
        <div class="nav-title">登记缴费</div>
        <div class="nav-spacer"></div>
      </div>

      <!-- 收据头部 -->
      <div class="receipt-header">
        <div class="receipt-label">RECEIPT · 缴费登记</div>
        <div class="receipt-title">课时记录</div>
        <div class="receipt-divider">
          <div class="line"></div>
          <div class="dot"></div>
          <div class="line"></div>
        </div>
        <div class="receipt-date">2026 · 05 · 07 · 周三</div>
      </div>

      <!-- 表单 -->
      <div class="form-section">
        <div class="form-section-title">基本信息</div>
        <div class="form-card">

          <div class="form-row">
            <div class="form-label">学员</div>
            <div class="form-value">
              <div class="selected-student">
                <span class="ava">明</span>
                <span>张小明</span>
              </div>
              <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </div>

          <div class="form-row">
            <div class="form-label">课程包</div>
            <div class="form-value">
              <span>一对一 · 45分钟</span>
              <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </div>

          <div class="form-row">
            <div class="form-label">课时数</div>
            <div class="form-value">
              <input type="text" value="30" style="width: 60px; font-family: var(--font-num); font-size: 18px;">
              <span style="color: var(--ink-soft);">节</span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-label">缴费日期</div>
            <div class="form-value">
              <span>2026-05-07</span>
              <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </div>

        </div>

        <!-- 金额 -->
        <div class="amount-row">
          <div>
            <div class="amount-label">实付金额</div>
            <div class="amount-value" style="margin-top: 6px;">
              <span class="currency">¥</span>6,000
            </div>
          </div>
          <div style="text-align: right;">
            <div style="font-family: var(--font-mono); font-size: 10px; color: rgba(250,246,240,0.5); letter-spacing: 1px;">单价 ¥200 × 30 节</div>
            <div style="font-size: 11px; color: rgba(250,246,240,0.7); margin-top: 4px; text-decoration: underline;">修改</div>
          </div>
        </div>
      </div>

      <!-- 支付方式 -->
      <div class="form-section">
        <div class="form-section-title">支付方式</div>
        <div class="pay-method-grid">
          <button class="pay-method-btn selected">微信</button>
          <button class="pay-method-btn">现金</button>
          <button class="pay-method-btn">转账</button>
          <button class="pay-method-btn">其他</button>
        </div>
      </div>

      <!-- 备注 -->
      <div class="form-section">
        <div class="form-section-title">备注(选填)</div>
        <div class="form-card">
          <div class="form-row" style="padding: 14px 16px;">
            <input type="text" placeholder="如:新生报名优惠 100" style="width: 100%; border: none; outline: none; font-size: 14px; color: var(--ink); background: transparent;">
          </div>
        </div>
      </div>

      <!-- 实时预览 -->
      <div class="preview-card">
        <div class="preview-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="preview-text">
          缴费后,小明剩余课时将变为 <strong>53</strong> 节
        </div>
      </div>

    </div>

    <!-- 底部确认 -->
    <div class="submit-bar">
      <button class="submit-btn">登记缴费 ¥6,000</button>
    </div>

  </div>
</div>

</body>
</html>
