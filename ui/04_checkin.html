<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>颂恩艺术 · 点名</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #1A2332; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px; font-family: 'Noto Sans SC', sans-serif;
  }
  :root {
    --paper: #F4F7FA; --paper-warm: #E8EFF5; --cream: #FFFFFF;
    --line: #DDE5ED; --line-soft: #EAF0F5;
    --ink: #2A3744; --ink-soft: #5A6B7E; --ink-mute: #93A3B5;
    --accent: #2C5282; --accent-soft: #BFD1E5; --accent-bg: #EDF3F9;
    --warn: #EA580C; --warn-bg: #FEF3C7;
    --green: #4D7C0F; --green-bg: #ECFCCB;
    --red: #B91C1C; --red-bg: #FEE2E2;
    --font-serif: 'Noto Serif SC', 'Songti SC', serif;
    --font-sans: 'Noto Sans SC', sans-serif;
    --font-script: 'Ma Shan Zheng', cursive;
    --font-num: 'DM Serif Display', 'Noto Serif SC', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  .phone-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .phone-label { color: #6B7E94; font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  .phone {
    width: 390px; height: 800px; background: var(--paper);
    border-radius: 44px; border: 12px solid #0F1620;
    box-shadow: 0 0 0 2px #1F2D3D, 0 60px 120px -30px rgba(0,0,0,0.5), 0 30px 60px -15px rgba(0,0,0,0.3);
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 110px; height: 28px; background: #0F1620; border-radius: 20px; z-index: 100; }
  .status-bar { height: 50px; padding: 18px 28px 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 500; color: var(--ink); flex-shrink: 0; }
  .status-bar .right { display: flex; gap: 5px; align-items: center; }
  .screen { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 110px; position: relative; }
  .screen::-webkit-scrollbar { display: none; }

  /* 顶部导航 */
  .nav-bar {
    height: 48px; padding: 0 18px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--line-soft);
    background: rgba(250,246,240,0.9);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 10;
  }
  .nav-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--ink); margin-left: -6px; }
  .nav-title { font-family: var(--font-serif); font-size: 16px; font-weight: 600; color: var(--ink); letter-spacing: 1px; }
  .nav-spacer { width: 32px; }

  /* 课程信息条 */
  .lesson-banner {
    background: var(--ink);
    color: var(--paper);
    padding: 18px 22px;
    position: relative;
    overflow: hidden;
  }
  .lesson-banner::after {
    content: "";
    position: absolute;
    right: -20px; top: -20px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(191,209,229,0.12) 0%, transparent 70%);
  }
  .lesson-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: rgba(250,246,240,0.5);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .lesson-title-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }
  .lesson-title {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 1px;
  }
  .lesson-time {
    font-family: var(--font-num);
    font-size: 22px;
    color: var(--accent-soft);
  }
  .lesson-detail {
    margin-top: 8px;
    font-size: 12px;
    color: rgba(250,246,240,0.7);
    display: flex;
    gap: 12px;
  }

  /* 提示条 */
  .tip-bar {
    background: var(--accent-bg);
    border-bottom: 1px solid var(--accent-soft);
    padding: 10px 22px;
    font-size: 12px;
    color: #7C2D12;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* 学员列表 */
  .roster {
    padding: 16px 22px 0;
  }

  .roster-stats {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
  }
  .roster-stat {
    flex: 1;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .roster-stat .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .roster-stat .dot.present { background: var(--green); }
  .roster-stat .dot.leave { background: var(--ink-mute); }
  .roster-stat .dot.absent { background: var(--red); }
  .roster-stat .label {
    font-size: 11px;
    color: var(--ink-soft);
    flex: 1;
  }
  .roster-stat .num {
    font-family: var(--font-num);
    font-size: 18px;
    color: var(--ink);
    line-height: 1;
  }

  /* 学员卡 */
  .student-row {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 14px 14px 16px;
    margin-bottom: 10px;
    transition: all 0.2s;
  }
  .student-row.absent { background: #FEF2F2; border-color: #FECACA; }
  .student-row.leave { background: var(--paper-warm); border-color: var(--line); }

  .student-row-top {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
  }

  .student-avatar-sm {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: linear-gradient(135deg, #2C5282, #3E73A6);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-serif);
    font-size: 16px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .student-row.leave .student-avatar-sm,
  .student-row.absent .student-avatar-sm {
    opacity: 0.5;
    filter: grayscale(0.5);
  }

  .student-row-info { flex: 1; min-width: 0; }
  .student-row-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .student-row-meta {
    font-size: 11px;
    color: var(--ink-soft);
    font-family: var(--font-mono);
  }
  .student-row-meta .warn {
    color: var(--accent);
    font-weight: 500;
  }

  /* 状态选择按钮组 */
  .status-pills {
    display: flex;
    gap: 6px;
  }
  .status-pill {
    flex: 1;
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: 100px;
    padding: 7px 10px;
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 500;
    text-align: center;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .status-pill.selected.present {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .status-pill.selected.leave {
    background: var(--ink-mute);
    border-color: var(--ink-mute);
    color: white;
  }
  .status-pill.selected.absent {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }
  .status-pill svg { width: 12px; height: 12px; }

  /* 底部确认条 */
  .confirm-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--cream);
    border-top: 1px solid var(--line);
    padding: 12px 22px 22px;
    z-index: 50;
    box-shadow: 0 -8px 30px -10px rgba(0,0,0,0.05);
  }

  .confirm-summary {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .confirm-summary .deduct {
    font-family: var(--font-num);
    font-size: 16px;
    color: var(--accent);
  }

  .confirm-btn {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 2px;
    font-family: var(--font-sans);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .confirm-btn::after {
    content: "→";
    font-family: var(--font-serif);
    font-size: 18px;
  }
</style>
</head>
<body>

<div class="phone-wrap">
  <div class="phone-label">老师端 · 点名</div>

  <div class="phone">
    <div class="notch"></div>

    <div class="status-bar">
      <span>9:41</span>
      <div class="right">
        <svg width="16" height="11" viewBox="0 0 18 12" fill="none"><path d="M1 8L1 4M5 9L5 3M9 11L9 1M13 10L13 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <svg width="16" height="11" viewBox="0 0 16 12" fill="none"><path d="M1 4Q8 -2 15 4M3 6Q8 2 13 6M5 8Q8 6 11 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/><circle cx="8" cy="10" r="1" fill="currentColor"/></svg>
        <svg width="24" height="11" viewBox="0 0 24 12" fill="none"><rect x="0.5" y="1" width="20" height="10" rx="2" stroke="currentColor"/><rect x="2" y="2.5" width="16" height="7" rx="1" fill="currentColor"/><rect x="21" y="4" width="2" height="4" rx="0.5" fill="currentColor"/></svg>
      </div>
    </div>

    <div class="screen">
      <!-- 顶部导航 -->
      <div class="nav-bar">
        <div class="nav-back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </div>
        <div class="nav-title">课堂点名</div>
        <div class="nav-spacer"></div>
      </div>

      <!-- 课程信息条 -->
      <div class="lesson-banner">
        <div class="lesson-meta">5月7日 · 周三 · 1号教室</div>
        <div class="lesson-title-row">
          <div class="lesson-title">周末班 · 4 人</div>
          <div class="lesson-time">20:00</div>
        </div>
        <div class="lesson-detail">
          <span>少儿播音 · 60分钟</span>
        </div>
      </div>

      <!-- 提示 -->
      <div class="tip-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        默认全部「到课」,只标记异常即可
      </div>

      <!-- 学员列表 -->
      <div class="roster">
        <!-- 状态统计 -->
        <div class="roster-stats">
          <div class="roster-stat">
            <span class="dot present"></span>
            <span class="label">到课</span>
            <span class="num">2</span>
          </div>
          <div class="roster-stat">
            <span class="dot leave"></span>
            <span class="label">请假</span>
            <span class="num">1</span>
          </div>
          <div class="roster-stat">
            <span class="dot absent"></span>
            <span class="label">缺勤</span>
            <span class="num">1</span>
          </div>
        </div>

        <!-- 学员1 - 到课 -->
        <div class="student-row">
          <div class="student-row-top">
            <div class="student-avatar-sm">明</div>
            <div class="student-row-info">
              <div class="student-row-name">张小明</div>
              <div class="student-row-meta">剩余 23 节</div>
            </div>
          </div>
          <div class="status-pills">
            <div class="status-pill selected present">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              到课
            </div>
            <div class="status-pill">请假</div>
            <div class="status-pill">缺勤</div>
          </div>
        </div>

        <!-- 学员2 - 到课 -->
        <div class="student-row">
          <div class="student-row-top">
            <div class="student-avatar-sm">红</div>
            <div class="student-row-info">
              <div class="student-row-name">李小红</div>
              <div class="student-row-meta">剩余 8 节</div>
            </div>
          </div>
          <div class="status-pills">
            <div class="status-pill selected present">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              到课
            </div>
            <div class="status-pill">请假</div>
            <div class="status-pill">缺勤</div>
          </div>
        </div>

        <!-- 学员3 - 请假 -->
        <div class="student-row leave">
          <div class="student-row-top">
            <div class="student-avatar-sm">刚</div>
            <div class="student-row-info">
              <div class="student-row-name">王小刚</div>
              <div class="student-row-meta warn">⚠ 剩余 1 节 · 请提醒续费</div>
            </div>
          </div>
          <div class="status-pills">
            <div class="status-pill">到课</div>
            <div class="status-pill selected leave">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 11H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-4"/></svg>
              请假 · 不扣
            </div>
            <div class="status-pill">缺勤</div>
          </div>
        </div>

        <!-- 学员4 - 缺勤 -->
        <div class="student-row absent">
          <div class="student-row-top">
            <div class="student-avatar-sm">美</div>
            <div class="student-row-info">
              <div class="student-row-name">陈小美</div>
              <div class="student-row-meta">剩余 15 节</div>
            </div>
          </div>
          <div class="status-pills">
            <div class="status-pill">到课</div>
            <div class="status-pill">请假</div>
            <div class="status-pill selected absent">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              缺勤
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- 底部确认条 -->
    <div class="confirm-bar">
      <div class="confirm-summary">
        <span>本次将扣减课时</span>
        <span><span class="deduct">3</span> 节 · 共 3 名学员</span>
      </div>
      <button class="confirm-btn">
        确认点名
      </button>
    </div>

  </div>
</div>

</body>
</html>
